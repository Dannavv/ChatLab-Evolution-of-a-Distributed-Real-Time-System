services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: chat
    volumes:
      - ../lab-10-microservices-migration/services/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d chat"]
      interval: 5s
      timeout: 5s
      retries: 8
    networks:
      - chat-net

    restart: always
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - chat-net

    restart: always
  jaeger:
    image: jaegertracing/all-in-one:1.55
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686" # UI
      - "4318:4318" # OTLP HTTP
    networks:
      - chat-net

    restart: always
  gateway:
    build:
      context: ../../
      dockerfile: labs/lab-10-microservices-migration/services/gateway/Dockerfile
    environment:
      NODE_ID: blueprint-gateway-01
      PORT: 8080
      REDIS_URL: redis://redis:6379
      MESSAGE_SERVICE_URL: http://message-service:8081
      HISTORY_SERVICE_URL: http://history-service:8082
      EVENTS_CHANNEL: chat:events
      RATE_LIMIT_PER_SEC: 100
      RATE_LIMIT_BURST: 200
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4318
    ports:
      - "8110:8080"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - chat-net

    restart: always
  message-service:
    build:
      context: ../../
      dockerfile: labs/lab-10-microservices-migration/services/message-service/Dockerfile
    environment:
      NODE_ID: blueprint-message-01
      PORT: 8081
      DB_URL: postgres://user:pass@db:5432/chat?sslmode=disable
      REDIS_URL: redis://redis:6379
      EVENTS_CHANNEL: chat:events
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4318
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - chat-net

    restart: always
  history-service:
    build:
      context: ../../
      dockerfile: labs/lab-10-microservices-migration/services/history-service/Dockerfile
    environment:
      NODE_ID: blueprint-history-01
      PORT: 8082
      DB_URL: postgres://user:pass@db:5432/chat?sslmode=disable
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4318
    depends_on:
      db:
        condition: service_healthy
    networks:
      - chat-net

    restart: always
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9101:9090"
    depends_on:
      - gateway
      - message-service
      - history-service
    networks:
      - chat-net

    restart: always
  grafana:
    image: grafana/grafana:10.4.2
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ../../shared/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../shared/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3011:3000"
    depends_on:
      - prometheus
    networks:
      - chat-net

    restart: always
networks:
  chat-net:
    driver: bridge
