benchmark_contract_version: 1
name: lab11-blueprint-benchmark
lab: lab-11-production-grade-blueprint
port: 8110
ws_url: ws://localhost:8110/ws
metrics_url: http://localhost:8110/metrics
health_url: http://localhost:8110/health
warmup_seconds: 8
scrape_interval_seconds: 1
summary_interval_seconds: 5
message_payload_bytes: 256
room_id: benchmark-comparison
results_dir: benchmark/results
comparison_profile:
  comparable_scenario: comparison_standard
  objective: Compare the deployable blueprint against the Lab 10 microservices mesh.
workload_model:
  protocol: websocket
  payload_shape: Same fixed-size benchmark payload as earlier labs, routed through the deployable gateway stack.
  concurrency_model: Deterministic virtual users with one message every 1000 ms in the comparison run.
metrics_contract:
  latency: Client-observed end-to-end latency across gateway and backend services.
  throughput: Server-side processed messages per second.
  error_rate: Dropped messages plus DB errors divided by total processed messages.
  db_latency: Database query latency when message and history services persist data.
traceability:
  contract: trace_id and message_id propagate through gateway, message service, history service, and storage.
  propagation: Client -> gateway -> message service -> database -> gateway/history service.
consistency_model:
  target: Service-coordinated durability with operational guardrails
  notes: The write path is durable and visible through one deployable control plane with metrics and dashboards.
failure_model:
  focus: Dependency degradation, rate-limit pressure, and service recovery under observability.
  mechanisms:
    - X-Trace-Id propagation
    - Per-service health and status endpoints
    - Dashboard-backed recovery diagnosis
routing_strategy:
  policy: Gateway-mediated routing with service-specific downstream ownership and standardized control-plane tooling.
  objective: Consolidate the strongest ideas from the previous labs into one deployable local blueprint.
observability:
  baseline: Prometheus, Grafana, benchmark artifacts, and structured container logs via Docker Compose.
  logging: Trace IDs support end-to-end message follow-through across services and dashboards.
cost_model:
  dominant_axis: Service-to-service hops, database writes, broker overhead, and operational complexity.
  notes: The blueprint is the most capable stack in the series and intentionally carries the highest platform cost.
synthesis:
  scaling_inflection: The architecture becomes deployable as a repeatable blueprint, but platform discipline becomes mandatory.
  learning_goal: End the curriculum with a runnable reference stack that prioritizes clarity, observability, and operational readiness.
scenarios:
  comparison_standard:
    description: Fair cross-lab comparison scenario with fixed duration and payload size.
    message_interval_ms: 1000
    stages:
      - duration: 1m
        target_vus: 100
  blueprint_validation:
    description: Validate the production-grade blueprint under a modest steady load.
    message_interval_ms: 1000
    stages:
      - duration: 1m
        target_vus: 100
      - duration: 1m
        target_vus: 300
