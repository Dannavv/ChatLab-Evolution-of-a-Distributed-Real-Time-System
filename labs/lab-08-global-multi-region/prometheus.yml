global:
  scrape_interval: 1s

scrape_configs:
  - job_name: chat-server-us
    static_configs:
      - targets: ["chat-server-us:8080"]

  - job_name: chat-server-eu
    static_configs:
      - targets: ["chat-server-eu:8080"]

  - job_name: bridge
    static_configs:
      - targets: ["bridge:8082"]
