services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - chat-net

    restart: always
  chat-server-1:
    build:
      context: ../../
      dockerfile: labs/lab-07-real-time-presence-and-delivery/services/chat-server/Dockerfile
    environment:
      NODE_ID: presence-01
      PORT: 8080
      REDIS_URL: redis://redis:6379
      EVENTS_CHANNEL: chat:presence-events
    ports:
      - "8088:8080"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - chat-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

    restart: always
  chat-server-2:
    build:
      context: ../../
      dockerfile: labs/lab-07-real-time-presence-and-delivery/services/chat-server/Dockerfile
    environment:
      NODE_ID: presence-02
      PORT: 8080
      REDIS_URL: redis://redis:6379
      EVENTS_CHANNEL: chat:presence-events
    ports:
      - "8089:8080"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - chat-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

    restart: always
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9095:9090"
    depends_on:
      - chat-server-1
      - chat-server-2
    networks:
      - chat-net

    restart: always
  grafana:
    image: grafana/grafana:10.4.2
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ../../shared/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../shared/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3007:3000"
    depends_on:
      - prometheus
    networks:
      - chat-net

    restart: always
networks:
  chat-net:
    driver: bridge
