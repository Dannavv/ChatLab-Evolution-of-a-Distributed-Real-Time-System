version: '3.8'

services:
  chat-server:
    build:
      context: ../../
      dockerfile: labs/lab-01-monolith-baseline/services/chat-server/Dockerfile
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    networks:
      - chat-net

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - chat-net

networks:
  chat-net:
    driver: bridge
