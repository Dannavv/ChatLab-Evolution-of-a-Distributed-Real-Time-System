services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: chat
    volumes:
      - ./services/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d chat"]
      interval: 5s
      timeout: 5s
      retries: 8
    networks:
      - chat-net

    restart: always
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - chat-net

    restart: always
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniopass
    ports:
      - "9010:9000"
      - "9011:9001"
    volumes:
      - minio-data:/data
    networks:
      - chat-net

    restart: always
  minio-sync:
    image: minio/mc:latest
    depends_on:
      - minio
    volumes:
      - archive-data:/archive
    entrypoint: >
      /bin/sh -c '
      until mc alias set local http://minio:9000 minio miniopass; do sleep 2; done;
      mc mb --ignore-existing local/chat-archive;
      while true; do
        mc mirror --overwrite /archive local/chat-archive;
        sleep 5;
      done
      '
    networks:
      - chat-net

    restart: always
  chat-api:
    build:
      context: ../../
      dockerfile: labs/lab-06-chaos-and-resilience/services/chat-api/Dockerfile
    environment:
      NODE_ID: chaos-api-01
      PORT: 8080
      REDIS_URL: redis://redis:6379
      QUEUE_KEY: chat:ingest
      EVENTS_CHANNEL: chat:events
      ENQUEUE_ATTEMPTS: 3
      ENQUEUE_RETRY_BACKOFF_MS: 120
      BREAKER_FAIL_THRESHOLD: 5
      BREAKER_COOLDOWN_MS: 5000
    ports:
      - "8086:8080"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - chat-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

    restart: always
  chat-worker:
    build:
      context: ../../
      dockerfile: labs/lab-06-chaos-and-resilience/services/chat-worker/Dockerfile
    environment:
      NODE_ID: chaos-worker-01
      PORT: 8081
      REDIS_URL: redis://redis:6379
      DB_URL: postgres://user:pass@db:5432/chat?sslmode=disable
      QUEUE_KEY: chat:ingest
      PROCESSING_KEY: chat:processing
      EVENTS_CHANNEL: chat:events
      PROCESSED_SET: chat:processed
      DEAD_LETTER_KEY: chat:dead
      ARCHIVE_DIR: /archive
      MAX_RETRIES: 3
    ports:
      - "8087:8081"
    volumes:
      - archive-data:/archive
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - chat-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

    restart: always
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9094:9090"
    depends_on:
      - chat-api
      - chat-worker
    networks:
      - chat-net

    restart: always
  grafana:
    image: grafana/grafana:10.4.2
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ../../shared/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../shared/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3006:3000"
    depends_on:
      - prometheus
    networks:
      - chat-net

    restart: always
volumes:
  archive-data:
  minio-data:

networks:
  chat-net:
    driver: bridge
