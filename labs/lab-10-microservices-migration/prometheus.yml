global:
  scrape_interval: 1s

scrape_configs:
  - job_name: gateway
    static_configs:
      - targets: ["gateway:8080"]

  - job_name: message-service
    static_configs:
      - targets: ["message-service:8081"]

  - job_name: history-service
    static_configs:
      - targets: ["history-service:8082"]
