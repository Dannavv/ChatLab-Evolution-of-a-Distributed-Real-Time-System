name: spike_recovery
description: Evaluate recovery after abrupt traffic spikes.
duration_seconds: 180
warmup_seconds: 5
scrape_interval_seconds: 1
message_interval_ms: 3000
seed: 42
stages:
  - duration: 20s
    target_vus: 200
  - duration: 20s
    target_vus: 1800
  - duration: 20s
    target_vus: 300
  - duration: 20s
    target_vus: 2000
  - duration: 60s
    target_vus: 400
  - duration: 40s
    target_vus: 0
