title: benchmark-workload-schema
version: 0.1.0
type: object
required:
  - name
  - duration_seconds
  - warmup_seconds
  - scrape_interval_seconds
  - message_interval_ms
  - stages
properties:
  name:
    type: string
    minLength: 1
  description:
    type: string
  duration_seconds:
    type: integer
    minimum: 1
  warmup_seconds:
    type: integer
    minimum: 0
  scrape_interval_seconds:
    type: integer
    minimum: 1
  message_interval_ms:
    type: integer
    minimum: 1
  seed:
    type: integer
  stages:
    type: array
    minItems: 1
    items:
      type: object
      required:
        - duration
        - target_vus
      properties:
        duration:
          type: string
          pattern: '^[0-9]+(ms|s|m|h)$'
        target_vus:
          type: integer
          minimum: 0
